<!-- 기존 HTML 구조 유지, 필요한 부분만 업데이트 -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- CSS 추가: 구글 정보 관련 스타일 -->
    <style>
        .badge-rating { background: #fffbeb; color: #b45309; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; border: 1px solid #fde68a; }
        .badge-open { background: #ecfdf5; color: #059669; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .badge-closed { background: #fef2f2; color: #dc2626; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .travel-time-box { margin-left: 120px; padding: 8px; color: #4b5563; font-size: 0.8rem; border-left: 2px dashed #cbd5e0; display: flex; align-items: center; gap: 5px; }
        .ai-card { background: linear-gradient(to right, #ffffff, #f0f9ff); border-left: 4px solid #3b82f6; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .floating-menu { bottom: 80px !important; } /* 위치 조정 */
    </style>
</head>
<body>

<!-- (중략: 기존 UI 요소들) -->

<!-- 플로팅 메뉴 업데이트 -->
<div class="floating-menu" id="gpsMenu" style="display:flex;">
    <button class="float-btn" style="background:#3b82f6;" onclick="handleGPS('restaurant')">🍴 AI 식당추천</button>
    <button class="float-btn" style="background:#475569;" onclick="handleGPS('smoking')">🚬 주변 흡연장소</button>
    <button class="float-btn" style="background:#10b981;" onclick="handleGPS('convenience')">🏪 편의점 찾기</button>
</div>

<!-- 이동시간 계산 버튼 (DAY 헤더 옆에 추가 예정) -->
<div id="dayGroups"></div>

<script>
    // GPS 및 Google API 연동 함수
    async function handleGPS(type) {
        if (!navigator.geolocation) return alert("GPS를 지원하지 않는 브라우저입니다.");
        
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            const res = await fetch(`/api/nearby?lat=${latitude}&lng=${longitude}&type=${type}`);
            const data = await res.json();
            
            let html = `<div style="text-align:left;">`;
            if (data.results.length === 0) html += "<p>주변에 검색된 장소가 없습니다.</p>";
            
            data.results.forEach(r => {
                const rating = r.rating ? `⭐️${r.rating}` : '';
                const aiDesc = r.ai_desc ? `<p style="font-size:0.85rem; color:#2563eb; margin:5px 0;">✨ ${r.ai_desc}</p>` : '';
                html += `
                    <div class="ai-card">
                        <strong>${r.name}</strong> <span class="badge-rating">${rating}</span>
                        ${aiDesc}
                        <a href="https://www.google.com/maps/search/?api=1&query=${r.name}&query_place_id=${r.place_id}" target="_blank" style="font-size:0.8rem; color:#666;">구글맵 보기</a>
                    </div>`;
            });
            html += `</div>`;
            
            // 결과를 모달이나 커스텀 팝업으로 표시 (alert 대신 커스텀 UI 권장)
            showModal("📍 주변 검색 결과", html);
        });
    }

    // 이동 시간 계산 버튼 실행
    async function calculateDayTransit(day) {
        const items = Array.from(document.querySelectorAll(`#list-day-${day} .tl-item`));
        for (let i = 0; i < items.length - 1; i++) {
            const originId = items[i].dataset.placeid;
            const destId = items[i+1].dataset.placeid;
            
            if (originId && destId && originId !== 'null' && destId !== 'null') {
                const res = await fetch(`/api/travel_time?origin=${originId}&dest=${destId}`);
                const data = await res.json();
                if (data.duration) {
                    const transitDiv = document.createElement('div');
                    transitDiv.className = 'travel-time-box';
                    transitDiv.innerHTML = `🚌 대중교통 약 <b>${data.duration}</b> (${data.distance})`;
                    items[i].after(transitDiv);
                }
            }
        }
    }

    // 일정 렌더링 시 별점 및 영업시간 뱃지 추가 (기존 renderSchedules 수정)
    function renderSchedules(schedules, isCommentOn) {
        const groupsDiv = document.getElementById('dayGroups'); 
        groupsDiv.innerHTML = "";
        const grouped = {}; 
        schedules.forEach(s => { if(!grouped[s.day_num]) grouped[s.day_num] = []; grouped[s.day_num].push(s); });

        Object.keys(grouped).forEach(day => {
            const dayBox = document.createElement('div'); dayBox.className = "day-block";
            dayBox.innerHTML = `
                <div class="day-header">
                    <span>DAY ${day}</span>
                    <button onclick="calculateDayTransit(${day})" style="font-size:0.7rem; background:#4a5568; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">⏱️ 이동시간 계산</button>
                </div>
                <ul class="timeline" id="list-day-${day}"></ul>`;
            groupsDiv.appendChild(dayBox);
            
            const ul = document.getElementById(`list-day-${day}`);
            grouped[day].forEach(s => {
                const ratingBadge = s.rating ? `<span class="badge-rating">⭐️ ${s.rating}</span>` : '';
                // place_id가 있을 경우에만 data-placeid 속성 추가
                ul.innerHTML += `
                    <li class="tl-item" data-id="${s.id}" data-placeid="${s.place_id}">
                        <div class="tl-time">${s.start_time}<br>~<br>${s.end_time}</div>
                        <div class="tl-content">
                            <div class="tl-label">${s.content} ${ratingBadge}</div>
                            <!-- (중략: 기존 코드와 동일한 버튼 및 댓글 로직) -->
                        </div>
                    </li>`;
            });
        });
    }

    // 모달창 띄우기 유틸리티
    function showModal(title, content) {
        // 기존 createRoomModal의 구조를 재활용하여 결과창을 띄우는 로직 구현
        alert(title + "\n" + "결과는 화면 하단 혹은 로그를 확인해주세요. (실제 구현 시 전용 모달 HTML 추가)");
        // 임시: 로그에 출력하거나 특정 div에 넣기
        const resultDiv = document.createElement('div');
        resultDiv.style = "position:fixed; top:20%; left:50%; transform:translateX(-50%); background:white; z-index:2000; padding:20px; border-radius:12px; box-shadow:0 0 20px rgba(0,0,0,0.3); width:90%; max-width:400px;";
        resultDiv.innerHTML = `<h3>${title}</h3>${content}<button onclick="this.parentElement.remove()" class="btn-submit">닫기</button>`;
        document.body.appendChild(resultDiv);
    }
</script>
</body>
</html>
